services:
  db:
    image: postgres:16-alpine
    container_name: train_schedule_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: train_schedule
    ports:
      - "5432:5432"
    volumes:
      - train_schedule_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d train_schedule"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  train_schedule_data:
